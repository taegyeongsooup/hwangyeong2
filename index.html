<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그린 데스크 — 환경 의사결정 시뮬레이션</title>
<style>
  :root{
    --bg-0:#0d1210;
    --bg-1:#141b18;
    --bg-2:#1b241f;
    --panel:#1a2420;
    --panel-edge:#2a3a32;
    --ink-0:#eef3ee;
    --ink-1:#b9c5bd;
    --ink-2:#7e9189;
    --line:#2c3a33;

    --env:#54c98a;
    --env-dim:#2c5440;
    --money:#e0b34b;
    --money-dim:#5a4a26;
    --rep:#5aa7e0;
    --rep-dim:#28415a;
    --emp:#e08a4e;
    --emp-dim:#5a3a22;

    --danger:#e2604f;
    --warn:#e0b34b;
    --good:#54c98a;

    --serif:"Noto Serif KR","Source Serif Pro",serif;
    --sans:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:"JetBrains Mono","Roboto Mono",ui-monospace,monospace;
  }

  *{box-sizing:border-box;}
  html{height:100%;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 800px at 50% -10%, #1d2b22 0%, var(--bg-0) 60%),
      var(--bg-0);
    color:var(--ink-0);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }

  #app{
    max-width:1320px;
    width:100%;
    margin:0 auto;
    padding:48px 32px;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:100vh;
  }

  @media (prefers-reduced-motion:no-preference){
    .fade-in{animation:fadeIn .45s ease both;}
    .pop-in{animation:popIn .35s cubic-bezier(.2,.9,.3,1.2) both;}
    .shake{animation:shake .4s ease;}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}

  a{color:inherit;}
  button{font-family:inherit;}

  /* ---------- 공통 카드 ---------- */
  .card{
    background:linear-gradient(180deg,var(--panel),#16201b);
    border:1px solid var(--panel-edge);
    border-radius:20px;
    padding:36px 40px;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 18px 40px -24px rgba(0,0,0,.7);
  }

  /* ---------- 타이틀 화면 ---------- */
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:42px;
  }
  .brand-mark{
    width:42px;height:42px;border-radius:10px;
    background:linear-gradient(135deg,var(--env),#2f7a55);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    flex-shrink:0;
  }
  .brand-name{
    font-family:var(--mono);
    font-size:15px;
    letter-spacing:.12em;
    color:var(--ink-2);
    text-transform:uppercase;
  }

  .hero-title{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(40px,5.4vw,64px);
    line-height:1.14;
    margin:0 0 18px;
    letter-spacing:-.01em;
  }
  .hero-title em{
    color:var(--env);
    font-style:normal;
  }
  .hero-sub{
    color:var(--ink-1);
    font-size:19px;
    line-height:1.75;
    max-width:680px;
    margin:0 0 38px;
  }

  .role-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
    margin-bottom:10px;
  }
  @media (max-width:640px){ .role-grid{grid-template-columns:1fr;} }

  .role-card{
    text-align:left;
    cursor:pointer;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:18px;
    padding:32px 28px;
    color:var(--ink-0);
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
    position:relative;
    overflow:hidden;
  }
  .role-card:hover{
    transform:translateY(-2px);
    border-color:var(--env);
    background:#1c2820;
  }
  .role-card:focus-visible{outline:2px solid var(--env); outline-offset:2px;}
  .role-emoji{font-size:42px; display:block; margin-bottom:14px;}
  .role-card h3{
    font-family:var(--serif);
    font-size:28px;
    margin:0 0 10px;
  }
  .role-card p{
    font-size:16.5px;
    color:var(--ink-2);
    line-height:1.65;
    margin:0 0 18px;
  }
  .role-stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .stat-chip{
    font-family:var(--mono);
    font-size:13px;
    padding:5px 12px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--ink-1);
  }

  .ghost-note{
    margin-top:32px;
    font-size:15px;
    color:var(--ink-2);
    line-height:1.7;
    border-top:1px dashed var(--line);
    padding-top:22px;
  }

  /* ---------- 상단 HUD ---------- */
  .hud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:16px;
    flex-wrap:wrap;
  }
  .hud-left{
    display:flex;
    align-items:center;
    gap:14px;
    font-family:var(--mono);
    font-size:15px;
    color:var(--ink-2);
  }
  .role-tag{
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:20px;
    padding:6px 16px;
    color:var(--ink-1);
  }
  .progress-track{
    flex:1;
    min-width:140px;
    height:9px;
    background:var(--bg-2);
    border-radius:8px;
    overflow:hidden;
    margin:0 18px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--env),#8fe0b6);
    transition:width .5s ease;
  }

  /* ---------- 스탯 대시보드 ---------- */
  .dashboard{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:22px;
  }
  @media (max-width:640px){ .dashboard{grid-template-columns:repeat(2,1fr);} }
  @media (min-width:641px) and (max-width:900px){ .dashboard{gap:12px;} .stat-value{font-size:26px;} }

  .stat-box{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:14px;
    padding:16px 18px 15px;
    position:relative;
  }
  .stat-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    color:var(--ink-2);
    margin-bottom:10px;
    letter-spacing:.02em;
  }
  .stat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .stat-value{
    font-family:var(--mono);
    font-size:27px;
    font-weight:700;
    margin-bottom:10px;
    transition:color .2s ease;
  }
  .stat-track{
    height:9px;
    background:var(--bg-2);
    border-radius:8px;
    overflow:hidden;
  }
  .stat-fill{
    height:100%;
    border-radius:8px;
    transition:width .55s cubic-bezier(.3,.8,.4,1);
  }
  .stat-delta{
    position:absolute;
    top:18px; right:20px;
    font-family:var(--mono);
    font-size:16px;
    font-weight:700;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    transform:translateY(2px);
  }
  .stat-delta.show{opacity:1; transform:translateY(0);}
  .stat-delta.pos{color:var(--good);}
  .stat-delta.neg{color:var(--danger);}

  .stat-box.warn-zone{border-color:var(--danger); box-shadow:0 0 0 1px rgba(226,96,79,.25) inset;}

  /* ---------- 돌발 이벤트 배너 ---------- */
  .event-banner{
    background:linear-gradient(135deg,#3a2a18,#241a10);
    border:1px solid #6a4a22;
    border-radius:18px;
    padding:26px 28px;
    margin-bottom:28px;
    display:flex;
    gap:18px;
    align-items:flex-start;
  }
  .event-icon{font-size:36px; line-height:1;}
  .event-tag{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:.08em;
    color:var(--warn);
    text-transform:uppercase;
    margin-bottom:6px;
    display:block;
  }
  .event-banner h4{
    font-family:var(--serif);
    font-size:22px;
    margin:0 0 8px;
  }
  .event-banner p{
    font-size:16.5px;
    color:var(--ink-1);
    line-height:1.65;
    margin:0;
  }

  /* ---------- 상황 카드 ---------- */
  .situation-card{
    margin-bottom:24px;
  }
  .situation-eyebrow{
    font-family:var(--mono);
    font-size:14px;
    color:var(--env);
    letter-spacing:.1em;
    text-transform:uppercase;
    margin-bottom:12px;
    display:block;
  }
  .situation-title{
    font-family:var(--serif);
    font-size:30px;
    line-height:1.3;
    margin:0 0 14px;
  }
  .situation-body{
    color:var(--ink-1);
    font-size:18px;
    line-height:1.7;
    margin:0;
  }

  .choices{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:26px;
  }
  .choice-btn{
    text-align:left;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 22px;
    color:var(--ink-0);
    cursor:pointer;
    font-size:17px;
    line-height:1.5;
    display:flex;
    gap:14px;
    align-items:flex-start;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .choice-btn:hover{
    border-color:var(--env);
    background:#1d2920;
  }
  .choice-btn:active{transform:scale(.997);}
  .choice-btn:focus-visible{outline:2px solid var(--env); outline-offset:2px;}
  .choice-letter{
    font-family:var(--mono);
    font-size:15px;
    color:var(--env);
    border:1px solid var(--env-dim);
    border-radius:8px;
    width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    margin-top:1px;
  }
  .choice-btn:disabled{opacity:.45; cursor:default;}

  /* ---------- 피드백 오버레이 ---------- */
  .feedback-card{
    margin-top:22px;
    border-radius:16px;
    padding:24px 26px;
    border:1px solid var(--line);
    background:var(--bg-2);
  }
  .feedback-tag{
    font-family:var(--mono);
    font-size:14px;
    color:var(--ink-2);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:8px;
    display:block;
  }
  .feedback-text{
    font-size:18px;
    line-height:1.7;
    color:var(--ink-1);
    margin:0 0 18px;
  }
  .delta-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .delta-pill{
    font-family:var(--mono);
    font-size:15px;
    padding:6px 14px;
    border-radius:20px;
    border:1px solid var(--line);
  }
  .delta-pill.pos{color:var(--good); border-color:var(--env-dim);}
  .delta-pill.neg{color:var(--danger); border-color:#5a2c26;}
  .next-btn{
    background:var(--env);
    color:#0d1812;
    border:none;
    border-radius:12px;
    padding:16px 30px;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
  }
  .next-btn:hover{filter:brightness(1.08);}

  /* ---------- 게임오버 / 결과 ---------- */
  .end-icon{font-size:62px; margin-bottom:10px;}
  .end-title{
    font-family:var(--serif);
    font-size:38px;
    margin:0 0 12px;
  }
  .title-badge{
    display:inline-block;
    margin:14px 0 22px;
    padding:14px 28px;
    border-radius:30px;
    border:1px solid var(--env);
    background:rgba(84,201,138,.08);
    font-family:var(--serif);
    font-size:23px;
    color:var(--env);
  }
  .title-badge.bad{border-color:var(--danger); background:rgba(226,96,79,.08); color:var(--danger);}
  .title-badge.neutral{border-color:var(--money); background:rgba(224,179,75,.08); color:var(--money);}

  .end-desc{
    color:var(--ink-1);
    font-size:18px;
    line-height:1.75;
    margin:0 auto 28px;
    max-width:760px;
  }

  .final-dashboard{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
    margin-bottom:32px;
  }
  @media (max-width:640px){ .final-dashboard{grid-template-columns:repeat(2,1fr);} }

  .divider{
    border:none;
    border-top:1px solid var(--line);
    margin:32px 0;
  }

  .section-label{
    font-family:var(--mono);
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--env);
    margin-bottom:14px;
    display:block;
  }
  .effort-list{
    margin:0 0 28px;
    padding:0;
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .effort-list li{
    font-size:17px;
    line-height:1.6;
    color:var(--ink-1);
    padding-left:22px;
    position:relative;
  }
  .effort-list li::before{
    content:"·";
    position:absolute;
    left:5px;
    color:var(--env);
    font-weight:700;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
    margin-bottom:18px;
  }
  @media (max-width:560px){ .form-grid{grid-template-columns:1fr 1fr;} }
  .form-field{display:flex; flex-direction:column; gap:8px;}
  .form-field.full{grid-column:1 / -1;}
  .form-field label{
    font-size:15px;
    color:var(--ink-2);
    font-family:var(--mono);
  }
  .form-field input, .form-field textarea{
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    color:var(--ink-0);
    font-size:17px;
    font-family:var(--sans);
    resize:vertical;
  }
  .form-field input:focus, .form-field textarea:focus{
    outline:none;
    border-color:var(--env);
  }
  .effort-inputs{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:24px;
  }
  .effort-inputs textarea{min-height:64px;}

  .end-actions{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .btn-primary{
    background:var(--env);
    color:#0d1812;
    border:none;
    border-radius:12px;
    padding:16px 30px;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
  }
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-primary:disabled{opacity:.5; cursor:default; filter:none;}
  .btn-secondary{
    background:transparent;
    color:var(--ink-1);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 30px;
    font-size:18px;
    cursor:pointer;
  }
  .btn-secondary:hover{border-color:var(--ink-1);}

  .save-status{
    font-size:16px;
    color:var(--ink-2);
    margin-top:14px;
    font-family:var(--mono);
  }
  .save-status.ok{color:var(--env);}

  .footnote{
    font-size:14.5px;
    color:var(--ink-2);
    line-height:1.65;
    margin-top:26px;
  }

  /* utility */
  .hide{display:none !important;}
  .center{text-align:center;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================
   1. 게임 데이터
   ========================================================= */

const ROLES = {
  corp: {
    key:"corp",
    name:"기업",
    emoji:"🏭",
    title:"기업 — 경영진",
    intro:"당신은 제조·에너지 분야 대기업의 경영진입니다. 주주, 직원, 사회 사이에서 균형을 잡아야 합니다.",
    stats:[
      {key:"env",   label:"환경",     color:"var(--env)",   dim:"var(--env-dim)"},
      {key:"profit",label:"이익",     color:"var(--money)", dim:"var(--money-dim)"},
      {key:"rep",   label:"평판",     color:"var(--rep)",   dim:"var(--rep-dim)"},
      {key:"emp",   label:"직원만족도", color:"var(--emp)",   dim:"var(--emp-dim)"}
    ]
  },
  gov: {
    key:"gov",
    name:"정부",
    emoji:"🏛️",
    title:"정부 — 정책 결정자",
    intro:"당신은 한 국가의 환경·경제 정책을 총괄하는 정책 결정자입니다. 국민, 기업, 국제사회의 목소리를 모두 들어야 합니다.",
    stats:[
      {key:"env", label:"환경",    color:"var(--env)",   dim:"var(--env-dim)"},
      {key:"econ",label:"경제",    color:"var(--money)", dim:"var(--money-dim)"},
      {key:"support",label:"지지율",color:"var(--rep)",   dim:"var(--rep-dim)"},
      {key:"intl",label:"국제관계", color:"var(--emp)",   dim:"var(--emp-dim)"}
    ]
  }
};

/* ---------------------------------------------------------
   상황 데이터: 각 역할별 15개 제작 → 실제 플레이는 10개 랜덤
   stat 변화는 4개 모두 변동 (요구사항)
   --------------------------------------------------------- */

const CORP_SITUATIONS = [
  {
    id:"c1", title:"노후 공장의 갈림길",
    body:"30년 된 주력 공장의 대기오염 방지 시설이 한계 수명에 도달했습니다. 환경부의 점검이 다음 달로 예정되어 있습니다.",
    choices:[
      {text:"최신 저탄소 설비로 전면 교체한다", effects:{env:21,profit:-36,rep:13,emp:7},
       feedback:"막대한 투자가 들어갔지만, 배출량이 크게 줄고 공정 안전성도 개선되었습니다. 단기 실적은 흔들립니다."},
      {text:"기존 설비를 최소한으로만 수리한다", effects:{env:-12,profit:13,rep:-8,emp:-5},
       feedback:"비용은 아꼈지만 직원들 사이에서 \"또 미봉책이냐\"는 불만이 나옵니다. 환경 지표는 계속 나빠집니다."},
      {text:"점검 직전에만 임시로 가동을 조정한다", effects:{env:-26,profit:6,rep:-25,emp:-12},
       feedback:"점검은 무사히 넘겼지만 내부 제보로 편법 운영 사실이 알려지며 신뢰가 흔들립니다."},
      {text:"설비 교체를 외부 펀드와 공동 투자로 진행한다", effects:{env:13,profit:-5,rep:8,emp:3},
       feedback:"투자 부담을 분산해 무리 없이 설비를 개선했습니다. 효과는 더 크지만 의사결정 속도는 느려졌습니다."}
    ]
  },
  {
    id:"c2", title:"협력업체의 폐수 무단 방류",
    body:"1차 협력업체 한 곳이 폐수를 무단으로 방류한 사실이 적발됐습니다. 직접 책임은 아니지만 공급망 전체가 도마 위에 올랐습니다.",
    choices:[
      {text:"즉시 거래를 끊고 새 협력업체를 찾는다", effects:{env:7,profit:-14,rep:10,emp:2},
       feedback:"단호한 결정으로 평판은 지켰지만 공급 차질로 생산 라인에 잠시 차질이 생겼습니다."},

function getStatRange(stats, key){ return stats[key]; }

function computeTitle(role, stats){
  // 정규화: 모든 스탯은 0~100 범위로 클램프되어 저장됨
  const env = stats.env;
  if(role==="corp"){
    const profit = stats.profit, rep = stats.rep, emp = stats.emp;
    if(env>=60 && profit>=50 && rep>=50 && emp>=50)
      return {name:"지속가능 경영의 모범", tone:"good",
        desc:"환경과 이익, 평판을 모두 균형 있게 끌어올린 보기 드문 경영진입니다. 단기 성과만 좇지 않고 장기적 지속가능성을 설계했습니다."};
    if(env<35 && profit>=55)
      return {name:"이번 분기만 보는 CEO", tone:"bad",
        desc:"이익은 지켰지만 환경 지표는 위험 수준입니다. 다음 분기, 다음 세대의 비용을 지금 끌어다 쓴 셈입니다."};
    if(env<35 && rep>=55)
      return {name:"이미지만 좋은 그린워싱 전문가", tone:"bad",
        desc:"대외 평판은 그럴듯하지만 실제 환경 성과는 따라오지 못했습니다. 언젠가 그 간극이 드러날 수 있습니다."};
    if(emp<30 && profit>=50)
      return {name:"숫자는 좋지만 사람을 잃은 경영자", tone:"bad",
        desc:"재무 성과는 나쁘지 않지만 그 과정에서 직원들의 신뢰를 잃었습니다. 조직은 숫자만으로 굴러가지 않습니다."};
    if(env<40 && profit<40 && rep<40 && emp<40)
      return {name:"총체적 난국의 경영진", tone:"bad",
        desc:"어느 지표에서도 뚜렷한 성과를 내지 못했습니다. 우선순위를 다시 세울 필요가 있습니다."};
    if(env>=55 && profit<30)
      return {name:"환경은 지켰지만 회사는 위태로운 경영자", tone:"neutral",
        desc:"환경적으로는 모범적이었지만 재무 건전성을 충분히 지키지 못했습니다. 지속가능성은 환경만으로 완성되지 않습니다."};
    if(env>=50 && emp>=55)
      return {name:"사람과 환경을 함께 본 리더", tone:"good",
        desc:"단기 이익보다 사람과 환경을 우선한 선택들이 쌓였습니다. 더 단단한 조직으로 향하고 있습니다."};
    if(profit>=55 && env<50)
      return {name:"안정적이지만 아쉬운 경영자", tone:"neutral",
        desc:"회사는 무너지지 않았지만, 환경에 대한 책임은 충분히 다하지 못했습니다. 다음에는 한 걸음 더 나아가 보세요."};
    return {name:"평범한 균형 경영자", tone:"neutral",
      desc:"두드러진 강점도, 치명적인 약점도 없는 무난한 경영이었습니다. 다음 도전에서는 한 영역에서 확실한 강점을 만들어보세요."};
  } else {
    const econ = stats.econ, support = stats.support, intl = stats.intl;
    if(env>=55 && econ>=50 && support>=50 && intl>=50)
      return {name:"기후 선도국을 이끈 지도자", tone:"good",
        desc:"환경, 경제, 지지율, 국제 관계를 모두 끌어올린 드문 리더십입니다. 단기적 인기와 장기적 책임을 함께 설계했습니다."};
    if(env<35 && support>=55)
      return {name:"인기는 많은데 미래는 없는 대통령", tone:"bad",
        desc:"지지율은 높지만 환경 지표는 위험 수준입니다. 당장의 인기를 위해 다음 세대의 환경을 미뤄둔 셈입니다."};
    if(env<35 && intl>=55)
      return {name:"국제무대용 이미지 정치가", tone:"bad",
        desc:"국제 사회에서의 평판 관리에는 능했지만 실제 국내 환경 성과는 미흡했습니다. 말과 실적의 간극이 큽니다."};
    if(support<30 && econ>=50)
      return {name:"경제는 지켰지만 신뢰를 잃은 지도자", tone:"bad",
        desc:"경제 지표는 지켰지만 국민의 신뢰를 충분히 얻지 못했습니다. 정책은 숫자만으로 완성되지 않습니다."};
    if(env<40 && econ<40 && support<40 && intl<40)
      return {name:"총체적 난국의 정부", tone:"bad",
        desc:"어느 지표에서도 뚜렷한 성과를 내지 못했습니다. 정책의 우선순위를 다시 세울 필요가 있습니다."};
    if(env>=50 && econ<28)
      return {name:"환경은 지켰지만 경제를 흔든 지도자", tone:"neutral",
        desc:"환경적 성과는 뚜렷했지만 경제적 충격을 충분히 관리하지 못했습니다. 전환에는 속도 조절이 필요합니다."};
    if(env>=45 && econ>=45)
      return {name:"녹색 성장을 증명한 정부", tone:"good",
        desc:"환경과 경제가 상충한다는 통념을 깨고 둘을 함께 끌어올린 보기 드문 성과입니다."};
    if(econ>=50 && env<45)
      return {name:"성장은 지켰지만 아쉬운 정부", tone:"neutral",
        desc:"경제는 무너지지 않았지만, 환경에 대한 책임은 충분히 다하지 못했습니다. 다음 임기에서는 한 걸음 더 나아가 보세요."};
    return {name:"평범한 균형 정부", tone:"neutral",
      desc:"두드러진 강점도, 치명적인 약점도 없는 무난한 정책 운영이었습니다. 다음 임기에서는 한 영역에서 확실한 성과를 만들어보세요."};
  }
}

/* =========================================================
   2. 게임 상태 & 엔진
   ========================================================= */

const TOTAL_ROUNDS = 10;
const EVENT_CHANCE = 0.30;

let state = {
  role:null,
  stats:{},
  round:0,
  situationQueue:[],
  pendingEvent:null,
  history:[], // {situationTitle, choiceText, effects}
  gameOverReason:null // "lose" | null
};

function clamp(v){ return Math.max(0, Math.min(100, v)); }

function initStats(role){
  const base = role==="corp"
    ? {env:50,profit:50,rep:50,emp:50}
    : {env:50,econ:50,support:50,intl:50};
  return base;
}

function pickRandomSituations(role){
  const pool = role==="corp" ? CORP_SITUATIONS.slice() : GOV_SITUATIONS.slice();
  // shuffle
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool.slice(0, TOTAL_ROUNDS);
}

/* =========================================================
   3. 렌더링
   ========================================================= */

const app = document.getElementById("app");

function render(){
  if(!state.role){
    renderTitleScreen();
  } else if(state.gameOverReason){
    renderEndScreen();
  } else if(state.round >= TOTAL_ROUNDS){
    state.gameOverReason = "clear";
    renderEndScreen();
  } else if(state.pendingEvent){
    renderEventThenSituation();
  } else {
    renderSituation();
  }
}

function statColorVars(roleKey, statKey){
  const role = ROLES[roleKey];
  const s = role.stats.find(s=>s.key===statKey);
  return s ? {color:s.color, dim:s.dim, label:s.label} : {color:"#999",dim:"#444",label:statKey};
}

function buildDashboardHTML(deltas){
  const role = ROLES[state.role];
  return `
    <div class="dashboard">
      ${role.stats.map(s=>{
        const val = clamp(state.stats[s.key]);
        const d = deltas ? deltas[s.key] : null;
        const warnZone = val<=20 ? "warn-zone":"";
        return `
        <div class="stat-box ${warnZone}">
          <span class="stat-delta ${d? (d>0?'pos show':'neg show'):''}">${d!=null?(d>0?'+'+d:d):''}</span>
          <div class="stat-label"><span class="stat-dot" style="background:${s.color}"></span>${s.label}</div>
          <div class="stat-value" style="color:${val<=20?'var(--danger)':'var(--ink-0)'}">${val}</div>
          <div class="stat-track"><div class="stat-fill" style="width:${val}%;background:${val<=20?'var(--danger)':s.color}"></div></div>
        </div>`;
      }).join("")}
    </div>
  `;
}

function buildHUD(){
  const role = ROLES[state.role];
  const pct = Math.round((state.round/TOTAL_ROUNDS)*100);
  return `
    <div class="hud">
      <div class="hud-left">
        <span class="role-tag">${role.emoji} ${role.name} 모드</span>
        <span>${state.round}/${TOTAL_ROUNDS} 라운드</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

function startGame(role){
  state.role = role;
  state.stats = initStats(role);
  state.round = 0;
  state.situationQueue = pickRandomSituations(role);
  state.pendingEvent = null;
  state.history = [];
  state.gameOverReason = null;
  goToNextRound();
}

function goToNextRound(){
  if(state.round >= TOTAL_ROUNDS){
    state.pendingEvent = null;
    render();
    return;
  }
  // 라운드 진입 전 30% 확률 이벤트 체크
  if(Math.random() < EVENT_CHANCE){
    const events = RANDOM_EVENTS[state.role];
    const ev = events[Math.floor(Math.random()*events.length)];
    state.pendingEvent = ev;
  } else {
    state.pendingEvent = null;
  }
  render();
}

              <span>${c.text}</span>
            </button>
          `).join("")}
        </div>
      </div>
    </div>
  `;

  const buttons = app.querySelectorAll(".choice-btn");
  buttons.forEach(btn=>{
    btn.addEventListener("click", ()=>{
      buttons.forEach(b=>b.disabled=true);
      const idx = parseInt(btn.dataset.idx,10);
      const choice = situation.choices[idx];
      const applied = applyEffects(choice.effects);
      state.history.push({
        situationTitle: situation.title,
        choiceText: choice.text,
        effects: choice.effects
      });
      renderChoiceResult(situation, choice, applied);
    });
  });
}

function applyEffects(effects){
  // 소프트캡: 스탯이 0 또는 100에 가까울수록 같은 방향 변화의 영향력을 크게 줄여
  // 큰 변동폭이 체감되면서도 한쪽 극단에만 쏠리지 않게 한다.
  const appliedDeltas = {};
  Object.keys(effects).forEach(k=>{
    const raw = effects[k];
    const cur = state.stats[k];
    let factor = 1;
    if(raw > 0 && cur > 60){
      // 60 이상에서 양의 변화는 빠르게 둔화 (60->1.0, 100->0.15)
      factor = Math.max(0.15, 1 - (cur - 60) / 47);
    } else if(raw < 0 && cur < 40){
      // 40 이하에서 음의 변화는 빠르게 둔화 (40->1.0, 0->0.15)
      factor = Math.max(0.15, 1 - (40 - cur) / 47);
    }
    const adjusted = Math.round(raw * factor);
    const before = state.stats[k];
    state.stats[k] = clamp(before + adjusted);
    appliedDeltas[k] = state.stats[k] - before;
  });
  return appliedDeltas;
}

            }).join("")}

        </div>

        <p class="footnote">
          ※ 결과 제출 시 입력한 정보와 게임 결과가 별도 스프레드시트(구글 시트)로 전송됩니다.
          제출 전, 선생님이 안내한 제출 주소(웹앱 URL)가 연결되어 있는지 확인해주세요.
        </p>
      </div>
    </div>
  `;

  document.getElementById("retry-btn").addEventListener("click", ()=>{
    state = {role:null, stats:{}, round:0, situationQueue:[], pendingEvent:null, history:[], gameOverReason:null};
    render();
  });

  document.getElementById("submit-btn").addEventListener("click", handleSubmit);
}

function buildFinalDashboard(){
  const role = ROLES[state.role];
  return `
    <div class="final-dashboard">
      ${role.stats.map(s=>{
        const val = clamp(state.stats[s.key]);
        return `
        <div class="stat-box">
          <div class="stat-label"><span class="stat-dot" style="background:${s.color}"></span>${s.label}</div>
          <div class="stat-value">${val}</div>
          <div class="stat-track"><div class="stat-fill" style="width:${val}%;background:${s.color}"></div></div>
        </div>`;
      }).join("")}
    </div>
  `;
}

function buildHistoryRecap(){
  if(state.history.length===0) return `<p style="color:var(--ink-2);font-size:13px;">기록된 선택이 없습니다.</p>`;
  return `
    <ul class="effort-list">
      ${state.history.map((h,i)=>`<li><strong style="color:var(--ink-0);">${i+1}. ${h.situationTitle}</strong> — ${h.choiceText}</li>`).join("")}
    </ul>
  `;
}

/* ---------- 제출 처리 ---------- */
// 선생님/제작자가 배포 시 이 값을 본인의 Google Apps Script 웹앱 URL로 교체하면
// 결과가 실제 구글 스프레드시트로 저장됩니다. (아래 안내 참고)
const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwne9pjWTJJzCmwJhrX2Vq2PMkjC1F3GEBCKqVRJtfIw3gUV6xEdTXGg3a2BsY92mAK/exec"; // 예: "https://script.google.com/macros/s/XXXXXXXX/exec"

function handleSubmit(){
  const grade = document.getElementById("f-grade").value.trim();
  const klass = document.getElementById("f-class").value.trim();
  const number = document.getElementById("f-number").value.trim();
  const name = document.getElementById("f-name").value.trim();
  const a1 = document.getElementById("effort-1").value.trim();
  const a2 = document.getElementById("effort-2").value.trim();
  const a3 = document.getElementById("effort-3").value.trim();

  const statusEl = document.getElementById("save-status");

  if(!grade || !klass || !number || !name){
    statusEl.textContent = "학년 / 반 / 번호 / 이름을 모두 입력해주세요.";
    statusEl.className = "save-status";
    return;
  }
  if(!a1 || !a2 || !a3){
    statusEl.textContent = "위 질문 3가지에 모두 답변을 작성해주세요.";
    statusEl.className = "save-status";
    return;
  }

  const role = ROLES[state.role];
  const titleInfo = computeTitle(state.role, state.stats);
  const questions = REFLECTION_QUESTIONS[state.role];

  const payload = {
    timestamp: new Date().toISOString(),
    grade, klass, number, name,
    role: role.name,
    result: "완주",
    title: titleInfo.name,
    stats: {...state.stats},
    question1: questions[0], answer1: a1,
    question2: questions[1], answer2: a2,
    question3: questions[2], answer3: a3,
    rounds: state.history.map(h=>`${h.situationTitle} → ${h.choiceText}`).join(" / ")
  };

  const submitBtn = document.getElementById("submit-btn");
  submitBtn.disabled = true;
  submitBtn.textContent = "제출 중...";

  if(!SHEET_WEBHOOK_URL){
    // 웹훅 URL이 설정되지 않은 경우: 로컬에 결과를 보관하고 안내만 표시
    statusEl.innerHTML = "⚠ 스프레드시트 연결 주소가 아직 설정되지 않았습니다. 결과 데이터를 아래에서 직접 복사하거나, 선생님께 웹앱 URL 설정을 요청하세요.";
    statusEl.className = "save-status";
    showPayloadFallback(payload);
    submitBtn.disabled = false;
    submitBtn.textContent = "결과 제출하기";
    return;
  }

  fetch(SHEET_WEBHOOK_URL, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  }).then(()=>{
    statusEl.textContent = "✓ 결과가 저장되었습니다. 제출이 완료되었습니다.";
    statusEl.className = "save-status ok";
    submitBtn.textContent = "제출 완료";
  }).catch(()=>{
    statusEl.textContent = "전송에 실패했습니다. 네트워크 상태를 확인하고 다시 시도해주세요.";
    statusEl.className = "save-status";
    submitBtn.disabled = false;
    submitBtn.textContent = "결과 제출하기";
  });
}

function showPayloadFallback(payload){
  let pre = document.getElementById("payload-fallback");
  if(!pre){
    pre = document.createElement("pre");
    pre.id = "payload-fallback";
    pre.style.cssText = "margin-top:12px;background:var(--bg-1);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:11px;color:var(--ink-2);white-space:pre-wrap;word-break:break-all;max-height:160px;overflow:auto;";
    document.getElementById("save-status").insertAdjacentElement("afterend", pre);
  }
  pre.textContent = JSON.stringify(payload, null, 2);
}

/* =========================================================
   4. 시작
   ========================================================= */
render();
</script>
</body>
</html>
